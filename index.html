<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="bySTATS">
<title>bySTATS</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root,[data-theme="verde"]{--bg:#f4f7f5;--bg2:#fff;--bg3:#eaf4ef;--card:#fff;--card2:#f0f9f4;--accent1:#0d8c3e;--accent2:#1dbb58;--accent3:#0d8c3e;--accent4:#1aa8cc;--accent5:#1aa8cc;--accentText:#0b8c72;--text:#0f1f15;--text2:#3d6b50;--text3:#7aaa8a;--border:#d4e8dc;--border2:#b8d9c6;--danger:#c0392b;--r:12px;--rs:8px}
  [data-theme="azul"]{--bg:#f0f5ff;--bg2:#fff;--bg3:#e6efff;--card:#fff;--card2:#eef4ff;--accent1:#1a5fd4;--accent2:#2d7ef0;--accent3:#1a5fd4;--accent4:#0ba8d4;--accent5:#0ba8d4;--accentText:#1050b0;--text:#0a1a3a;--text2:#2a4a80;--text3:#7090c0;--border:#c8d8f5;--border2:#a8c0ee;--danger:#c0392b}
  [data-theme="rojo"]{--bg:#fff5f5;--bg2:#fff;--bg3:#ffe8e8;--card:#fff;--card2:#fff0f0;--accent1:#c0392b;--accent2:#e84040;--accent3:#c0392b;--accent4:#e8700a;--accent5:#e8700a;--accentText:#a02020;--text:#2a0a0a;--text2:#7a2a2a;--text3:#c08080;--border:#f5c8c8;--border2:#eeaaaa;--danger:#c0392b}
  [data-theme="morado"]{--bg:#f7f4ff;--bg2:#fff;--bg3:#ede8ff;--card:#fff;--card2:#f3f0ff;--accent1:#6d28d9;--accent2:#8b5cf6;--accent3:#6d28d9;--accent4:#c026d3;--accent5:#c026d3;--accentText:#5b21b6;--text:#1a0a3a;--text2:#4a2a80;--text3:#9070c0;--border:#ddd0f5;--border2:#c8b8ee;--danger:#c0392b}
  [data-theme="naranja"]{--bg:#fff8f0;--bg2:#fff;--bg3:#fff0e0;--card:#fff;--card2:#fff5e8;--accent1:#c05c00;--accent2:#f07020;--accent3:#c05c00;--accent4:#d4a000;--accent5:#d4a000;--accentText:#a04800;--text:#2a1000;--text2:#7a4010;--text3:#c09060;--border:#f5dcc0;--border2:#eecca0;--danger:#c0392b}
  [data-theme="oscuro"]{--bg:#0e0e12;--bg2:#16161e;--bg3:#1a1a26;--card:#16161e;--card2:#1e1e2e;--accent1:#7c3aed;--accent2:#a855f7;--accent3:#7c3aed;--accent4:#06b6d4;--accent5:#06b6d4;--accentText:#a78bfa;--text:#e8e8f8;--text2:#9898c8;--text3:#5858a0;--border:#2a2a42;--border2:#3a3a58;--danger:#f87171}
  [data-theme="negro"]{--bg:#080808;--bg2:#111;--bg3:#181818;--card:#111;--card2:#1a1a1a;--accent1:#39e07a;--accent2:#22c55e;--accent3:#39e07a;--accent4:#38bdf8;--accent5:#38bdf8;--accentText:#4ade80;--text:#f0f0f0;--text2:#a0a0a0;--text3:#505050;--border:#2a2a2a;--border2:#383838;--danger:#f87171}
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
    overflow-x: hidden;
  }
  .app-header {
    background: linear-gradient(135deg, var(--bg2) 0%, var(--bg3) 100%);
    border-bottom: 1px solid var(--border2);
    padding: 16px 20px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent1) 0%, var(--accent4) 100%);
    border-radius: var(--rs);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    background: linear-gradient(90deg, var(--accent1) 0%, var(--accent4) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header-date {
    font-size: 12px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* DAYS NAV */
  .days-nav {
    display: flex;
    overflow-x: auto;
    gap: 8px;
    padding: 14px 16px;
    scrollbar-width: none;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }
  .days-nav::-webkit-scrollbar { display: none; }
  .day-btn {
    flex-shrink: 0;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 7px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .day-btn.active {
    background: linear-gradient(135deg, var(--accent3) 0%, var(--accent5) 100%);
    border-color: transparent;
    color: var(--text);
  }
  .day-btn:hover:not(.active) {
    border-color: var(--border2);
    color: var(--text);
  }

  /* MAIN */
  .main { padding: 16px; padding-bottom: 100px; }

  /* DAY HEADER */
  .day-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .day-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 1px;
    color: var(--text);
  }
  .day-subtitle { font-size: 12px; color: var(--text3); margin-top: 1px; }

  /* EXERCISE CARD */
  .exercise-list { display: flex; flex-direction: column; gap: 10px; }
  .exercise-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r);
    padding: 14px 16px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .exercise-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, var(--accent1) 0%, var(--accent4) 100%);
    border-radius: 3px 0 0 3px;
  }
  .exercise-card:hover { border-color: var(--border2); background: var(--card2); }
  .exercise-card-top { display: flex; align-items: center; justify-content: space-between; }
  .exercise-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .exercise-muscle {
    font-size: 11px;
    color: var(--accent1);
    background: rgba(0,0,0,0.06);
    border-radius: 999px;
    padding: 3px 10px;
    font-weight: 500;
  }
  .exercise-pr-row {
    margin-top: 8px;
    display: flex;
    gap: 16px;
  }
  .pr-stat { display: flex; flex-direction: column; gap: 1px; }
  .pr-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; }
  .pr-value { font-size: 14px; font-weight: 600; color: var(--accentText); }
  .pr-value.no-data { color: var(--text3); font-weight: 400; font-size: 12px; }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 50px 20px;
    color: var(--text3);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-title { font-size: 16px; color: var(--text2); margin-bottom: 6px; }
  .empty-sub { font-size: 13px; }

  /* ADD BUTTON */
  .fab {
    position: fixed;
    bottom: 24px;
    right: 50%;
    transform: translateX(50%);
    max-width: calc(480px - 40px);
    width: calc(100% - 40px);
    background: linear-gradient(135deg, var(--accent2) 0%, var(--accent5) 100%);
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 15px 24px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.18);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    z-index: 50;
    transition: opacity 0.2s;
  }
  .fab:hover { opacity: 0.9; }
  .fab svg { width: 18px; height: 18px; }

  /* MODAL OVERLAY */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--bg2);
    border-radius: var(--r) var(--r) 0 0;
    border: 1px solid var(--border2);
    border-bottom: none;
    padding: 20px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .modal-handle {
    width: 40px; height: 4px;
    background: var(--border2);
    border-radius: 2px;
    margin: 0 auto 20px;
  }
  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 1px;
    margin-bottom: 18px;
    color: var(--text);
  }

  /* DETAIL MODAL */
  .detail-top {
    background: var(--bg3);
  }
  .detail-exercise-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 1px;
    color: var(--text);
    margin-bottom: 4px;
  }
  .pr-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 18px;
  }
  .pr-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--rs);
    padding: 12px;
    text-align: center;
  }
  .pr-box-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .pr-box-value { font-size: 20px; font-weight: 600; color: var(--accent1); font-family: 'Bebas Neue', sans-serif; letter-spacing: 1px; }
  .pr-box-unit { font-size: 11px; color: var(--text3); }
  .pr-box-value.empty { color: var(--text3); font-size: 14px; font-family: 'DM Sans', sans-serif; font-weight: 400; }

  .section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text3);
    margin-bottom: 10px;
    font-weight: 600;
  }

  /* HISTORY */
  .history-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
  .history-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--rs);
    padding: 11px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .history-date { font-size: 12px; color: var(--text3); }
  .history-stats { display: flex; gap: 12px; }
  .history-stat { font-size: 13px; font-weight: 600; color: var(--text); }
  .history-stat span { color: var(--text3); font-weight: 400; font-size: 11px; }
  .history-delete {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 16px;
    padding: 4px;
    border-radius: 4px;
    transition: color 0.2s;
  }
  .history-delete:hover { color: var(--danger); }
  .no-history { font-size: 13px; color: var(--text3); text-align: center; padding: 20px; }

  /* FORM */
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; display: block; font-weight: 500; }
  .form-input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: var(--rs);
    padding: 11px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus { border-color: var(--accent1); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }

  .btn-primary {
    width: 100%;
    background: linear-gradient(135deg, var(--accent2) 0%, var(--accent5) 100%);
    color: #fff;
    border: none;
    border-radius: var(--rs);
    padding: 13px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 4px;
  }
  .btn-secondary {
    width: 100%;
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border2);
    border-radius: var(--rs);
    padding: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    cursor: pointer;
    margin-top: 8px;
  }
  .btn-danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid rgba(232,75,75,0.3);
    border-radius: var(--rs);
    padding: 8px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-danger:hover { background: rgba(232,75,75,0.1); }

  .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
  .modal-actions .btn-primary { flex: 1; margin-top: 0; }
  .modal-actions .btn-secondary { width: auto; padding: 12px 18px; margin-top: 0; }

  /* BADGE */
  .badge-today {
    font-size: 10px;
    background: rgba(0,0,0,0.07);
    color: var(--accent1);
    border-radius: 999px;
    padding: 2px 8px;
    font-weight: 600;
  }

  /* MANAGE DAYS */
  .manage-section { margin-bottom: 20px; }
  .manage-day-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--rs);
    margin-bottom: 8px;
  }
  .manage-day-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .manage-day-count { font-size: 12px; color: var(--text3); }

  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent1);
    color: #fff;
    padding: 10px 20px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 500;
    z-index: 500;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }

  select.form-input { appearance: none; }

  /* SERIES BUTTONS */
  .series-btn {
    width: 44px; height: 44px;
    border-radius: var(--rs);
    border: 1.5px solid var(--border2);
    background: var(--card);
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .series-btn.active {
    background: linear-gradient(135deg, var(--accent2) 0%, var(--accent5) 100%);
    border-color: transparent;
    color: #fff;
  }
  .series-btn:hover:not(.active) { border-color: var(--accent1); color: var(--text); }

  /* EXERCISE CATALOG */
  .catalog-search {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: var(--rs);
    padding: 10px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }
  .catalog-search:focus { border-color: var(--accent1); }
  .catalog-group { margin-bottom: 14px; }
  .catalog-group-title {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text3);
    font-weight: 600;
    margin-bottom: 6px;
    padding: 0 2px;
  }
  .catalog-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--rs);
    margin-bottom: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .catalog-item:hover { border-color: var(--accent1); background: var(--card2); }
  .catalog-item-name { font-size: 14px; font-weight: 500; color: var(--text); }
  .catalog-item-add {
    font-size: 18px;
    color: var(--accent1);
    line-height: 1;
  }

  /* Custom muscle input */
  .custom-muscle-input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--accent1);
    border-radius: var(--rs);
    padding: 11px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    outline: none;
    margin-top: 8px;
    transition: border-color 0.2s;
  }
  .custom-muscle-input:focus { border-color: var(--accent2); }

  /* MUSCLE PICKER */
  .muscle-picker-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--r);
    overflow: hidden;
    transition: all 0.2s;
  }
  .muscle-picker-card.expanded { border-color: var(--border2); }
  .muscle-picker-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
    position: relative;
  }
  .muscle-picker-header::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(180deg, #e8700a 0%, #f0a030 100%);
    border-radius: 3px 0 0 3px;
  }
  .muscle-picker-header.biceps-header::before {
    background: linear-gradient(180deg, #8b5cf6 0%, #c026d3 100%);
  }
  .muscle-picker-label {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .muscle-picker-label .muscle-tag {
    font-size: 11px;
    color: #c05c00;
    background: rgba(200,100,0,0.1);
    border-radius: 999px;
    padding: 2px 9px;
    font-weight: 600;
  }
  .muscle-picker-label .muscle-tag.biceps-tag {
    color: #7c3aed;
    background: rgba(139,92,246,0.1);
  }
  .muscle-picker-arrow {
    font-size: 14px;
    color: var(--text3);
    transition: transform 0.2s;
  }
  .muscle-picker-card.expanded .muscle-picker-arrow { transform: rotate(180deg); }
  .muscle-picker-options {
    display: none;
    padding: 0 12px 12px;
    flex-direction: column;
    gap: 8px;
  }
  .muscle-picker-card.expanded .muscle-picker-options { display: flex; }
  .muscle-option {
    background: var(--bg3);
    border: 1.5px solid var(--border);
    border-radius: var(--rs);
    padding: 11px 14px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: var(--text2);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .muscle-option:hover { border-color: #e8700a; color: var(--text); background: var(--card2); }
  .muscle-option.biceps-opt:hover { border-color: #8b5cf6; }
  .muscle-option.selected { border-color: #e8700a; background: rgba(200,100,0,0.08); color: var(--text); }
  .muscle-option.biceps-opt.selected { border-color: #8b5cf6; background: rgba(139,92,246,0.08); }
  .muscle-option-check { font-size: 16px; opacity: 0; transition: opacity 0.15s; }
  .muscle-option.selected .muscle-option-check { opacity: 1; }
  .muscle-picker-actions {
    display: none;
    padding: 0 12px 12px;
    gap: 8px;
  }
  .muscle-picker-card.expanded .muscle-picker-actions { display: flex; }
  .muscle-confirm-btn {
    flex: 1;
    background: linear-gradient(135deg, #e8700a 0%, #f0a030 100%);
    color: #fff;
    border: none;
    border-radius: var(--rs);
    padding: 11px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: opacity 0.2s;
  }
  .muscle-confirm-btn:hover { opacity: 0.9; }
  .muscle-confirm-btn.biceps-btn {
    background: linear-gradient(135deg, #7c3aed 0%, #c026d3 100%);
  }
  .muscle-back-btn {
    background: transparent;
    color: var(--text3);
    border: 1px solid var(--border2);
    border-radius: var(--rs);
    padding: 11px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: color 0.2s;
  }
  .muscle-back-btn:hover { color: var(--text); }
